[flake8]
max-line-length = 88
extend-ignore = E203,W503
# Keep excludes focused on generated/cache/build artifacts and non-Python app trees.
# Avoid listing nested paths under an already excluded parent directory.
exclude =
    .github
    .pytest_cache
    .ruff_cache
    .venv
    .venv-1
    .vscode
    docs
    mobile
per-file-ignores =
    __init__.py:F401